<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview Mobile - Calcagnoto</title>
  <style>
    :root {
      --bg: #0f1323;
      --frame: #1c233d;
      --border: #2c365d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 0%, rgba(243,215,142,.15), transparent 35%),
        var(--bg);
      padding: 2rem 1rem;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #d6dbe6;
    }
    .wrap {
      width: min(100%, 430px);
      display: grid;
      gap: 0.8rem;
      justify-items: center;
    }
    .label {
      font-size: .92rem;
      opacity: .85;
      text-align: center;
    }
    .phone {
      width: 390px;
      height: 844px;
      max-width: 100%;
      border: 10px solid var(--frame);
      border-radius: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,.45);
      overflow: hidden;
      background: #000;
      position: relative;
    }
    .notch {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 34%;
      height: 22px;
      border-radius: 999px;
      background: #0d0d0d;
      z-index: 2;
      pointer-events: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="label">Preview mobile (390x844)</p>
    <div class="phone">
      <div class="notch"></div>
      <iframe src="/advogado-divorcio" title="Landing mobile"></iframe>
    </div>
  </div>
</body>
</html>
